services:
  test-db:
    image: postgres:15-alpine
    container_name: telsim-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telsim_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telsim_test"]
      interval: 5s
      timeout: 5s
      retries: 5
