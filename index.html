<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <!-- Quitar restricción de zoom mobile (accesibilidad + SEO) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título más descriptivo -->
    <title>Telsim | Infraestructura de números reales para agentes de IA</title>
    <!-- SEO básico -->
    <meta name="description" content="Telsim ofrece infraestructura de números reales para agentes de IA, automatización y validación SMS. Opera OTP, webhooks, API y bots con una capa confiable de identidad telefónica." />
    <link rel="canonical" href="https://telsim.io" />

    <!-- Open Graph para WhatsApp, LinkedIn, Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://telsim.io" />
    <meta property="og:title" content="Telsim | Infraestructura de números reales para agentes de IA" />
    <meta property="og:description" content="Infraestructura de números reales para agentes de IA, automatización y validación SMS. Opera OTP, API, webhooks y bots sobre una capa confiable de identidad telefónica." />
    <meta property="og:image" content="https://telsim.io/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- PWA & Mobile Optimization -->
    <meta name="theme-color" content="#1B3A8A" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Telsim" />
    <meta name="screen-orientation" content="portrait">

    <!-- Stripe JS -->
    <script src="https://js.stripe.com/v3/"></script>

    <!-- Fonts & Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons (Material Icons & Symbols) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
      body {
        font-family: 'Manrope', sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
        overflow-x: clip; /* clip evita crear un scroll-container (fix iOS Safari) */
        background-color: #F1F5F9;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* REGLA GLOBAL FORZADA PARA ICONOS (Fijar fallo de texto plano) */
      .material-icons {
        font-family: 'Material Icons' !important;
        font-weight: normal;
        font-style: normal;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        font-display: block; /* Evita que el navegador muestre texto antes que el glifo */
      }

      .material-icons-round {
        font-family: 'Material Icons Round' !important;
        font-weight: normal;
        font-style: normal;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        font-display: block;
      }

      /* Fallback adicional para Material Symbols */
      .material-symbols-rounded, .material-symbols-outlined {
        font-display: block;
        line-height: 1;
      }

      .material-symbols-rounded {
        font-family: 'Material Symbols Rounded' !important;
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined' !important;
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
    </style>
  <!-- Import map: con Vite (npm run dev / build) las dependencias se resuelven por bundle local.
       Si usas este HTML sin build y fallan cargas desde esm.sh, ejecuta "npm run build" y sirve "dist/". -->
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.91.1",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0",
    "stripe": "https://esm.sh/stripe@^20.3.1"
  }
}
</script>
</head>
  <body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
